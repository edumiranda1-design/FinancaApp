<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Dinheiro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}
.header{background:linear-gradient(135deg,#2d6a4f,#40916c);color:#fff;padding:24px 20px 32px;border-radius:0 0 28px 28px}
.header h1{font-size:20px;font-weight:600;margin-bottom:4px}
.header .sub{font-size:13px;opacity:.8}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
.month-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}
.month-nav .month-label{font-size:18px;font-weight:600}
.balance-card{background:#fff;margin:16px;border-radius:20px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.balance-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.balance-label{font-size:13px;color:#718096}
.balance-value{font-size:28px;font-weight:700;color:#2d6a4f}
.balance-sub{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid #f0f4f8}
.bs-item{flex:1;text-align:center}
.bs-item .val{font-size:16px;font-weight:600}
.bs-item .lbl{font-size:11px;color:#718096;margin-top:2px}
.positive{color:#38a169}
.negative{color:#e53e3e}
.tabs{display:flex;gap:8px;padding:0 16px;margin-top:12px}
.tab{flex:1;padding:10px;border:none;background:#fff;border-radius:12px;font-size:13px;font-weight:500;color:#718096;cursor:pointer;transition:.2s}
.tab.active{background:#2d6a4f;color:#fff}
.section{padding:0 16px}
.section-title{font-size:14px;font-weight:600;color:#4a5568;margin:16px 0 10px}
.account-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.account-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.account-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px}
.account-name{font-size:15px;font-weight:600}
.account-type{font-size:11px;color:#718096}
.input-row{display:flex;align-items:center;gap:8px}
.input-row label{font-size:12px;color:#718096;min-width:60px}
.money-input{flex:1;border:1.5px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:600;color:#1a202c;background:#f8fafc;outline:none;width:100%}
.money-input:focus{border-color:#2d6a4f;background:#fff}
.save-btn{background:#2d6a4f;color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;width:100%;margin-top:4px;cursor:pointer;transition:.15s}
.save-btn:active{transform:scale(.98);background:#1b4332}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d6a4f;color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:500;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.chart-wrap{background:#fff;border-radius:20px;padding:16px;margin:0 16px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.meta-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.meta-title{font-size:14px;font-weight:600;margin-bottom:8px}
.meta-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.meta-input-wrap{display:flex;flex-direction:column;gap:4px}
.meta-input-wrap label{font-size:11px;color:#718096}
.progress-bar{background:#e2e8f0;border-radius:50px;height:10px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#40916c,#74c69d);transition:.5s}
.progress-text{font-size:12px;color:#718096}
.emoji-feedback{font-size:24px;text-align:center;margin:8px 0}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;justify-content:space-around;padding:8px 0;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;font-size:10px;color:#718096;cursor:pointer;padding:4px 12px}
.nav-btn.active{color:#2d6a4f}
.nav-icon{font-size:20px}
.feedback-badge{display:inline-block;background:#ebf8f1;color:#2d6a4f;border-radius:50px;padding:6px 14px;font-size:13px;font-weight:500;margin:4px 4px 0 0}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f4f8;font-size:14px}
.summary-row:last-child{border:none;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Meu Dinheiro</h1>
    <div class="sub">Simples, rápido e tranquilo</div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span class="month-label" id="monthLabel"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>

  <div class="balance-card">
    <div class="balance-row">
      <span class="balance-label">Patrimônio total</span>
      <span id="feedbackEmoji">&#128522;</span>
    </div>
    <div class="balance-value" id="totalBalance">R$ 0,00</div>
    <div id="feedbackMsg" style="font-size:13px;color:#718096;margin-top:4px"></div>
    <div class="balance-sub">
      <div class="bs-item"><div class="val positive" id="totalIn">R$ 0</div><div class="lbl">Entradas</div></div>
      <div class="bs-item"><div class="val" style="color:#718096" id="totalStable">R$ 0</div><div class="lbl">Estável</div></div>
      <div class="bs-item"><div class="val negative" id="totalOut">R$ 0</div><div class="lbl">Saídas</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('lancamentos',this)">Lançar</button>
    <button class="tab" onclick="showTab('resumo',this)">Resumo</button>
    <button class="tab" onclick="showTab('metas',this)">Metas</button>
  </div>

  <div id="tab-lancamentos">
    <div class="section">
      <div class="section-title">Quanto está em cada conta este mês?</div>
    </div>
    <div id="accountsList"></div>
    <div class="section">
      <button class="save-btn" onclick="saveLancamentos()">Salvar este mês ✓</button>
    </div>
  </div>

  <div id="tab-resumo" style="display:none">
    <div class="section">
      <div class="section-title">Evolução do patrimônio</div>
    </div>
    <div class="chart-wrap">
      <div style="position:relative;height:200px"><canvas id="chartEvolucao" role="img" aria-label="Gráfico de evolução do patrimônio ao longo dos meses"></canvas></div>
    </div>
    <div class="section">
      <div class="section-title">Detalhes do mês</div>
      <div class="account-card">
        <div id="summaryTable"></div>
      </div>
    </div>
  </div>

  <div id="tab-metas" style="display:none">
    <div class="section">
      <div class="section-title">Minhas metas</div>
      <div class="meta-card">
        <div class="meta-title">Meta financeira</div>
        <div class="meta-inputs">
          <div class="meta-input-wrap">
            <label>Minha meta (R$)</label>
            <input class="money-input" type="number" id="metaValor" placeholder="Ex: 50000" oninput="updateMeta()">
          </div>
          <div class="meta-input-wrap">
            <label>Super meta (R$)</label>
            <input class="money-input" type="number" id="superMetaValor" placeholder="Ex: 100000" oninput="updateMeta()">
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="metaProgress" style="width:0%"></div></div>
        <div class="progress-text" id="metaText">Defina sua meta acima</div>
        <div class="emoji-feedback" id="metaEmoji">🎯</div>
        <div id="metaFeedback" style="text-align:center;font-size:13px;color:#718096"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const ACCOUNTS = [
  {id:'corrente',name:'Conta Corrente',icon:'🏦',color:'#ebf8ff',type:'Banco'},
  {id:'nubank',name:'Nubank',icon:'💜',color:'#f5f0ff',type:'Digital'},
  {id:'tesouro',name:'Tesouro Direto',icon:'📈',color:'#f0fff4',type:'Investimento'},
  {id:'rico',name:'Rico',icon:'💹',color:'#fffff0',type:'Corretora'},
  {id:'rendafixa',name:'Renda Fixa',icon:'🔒',color:'#fff5f5',type:'Investimento'},
  {id:'fii',name:'FII',icon:'🏢',color:'#fffaf0',type:'Fundos'},
  {id:'projetos',name:'Projetos',icon:'🚀',color:'#f0f4ff',type:'Outros'},
  {id:'acoes',name:'Ações',icon:'📊',color:'#f5fffa',type:'Renda Variável'},
];

let now = new Date();
let curYear = now.getFullYear();
let curMonth = now.getMonth();
let data = JSON.parse(localStorage.getItem('meuDinheiro') || '{}');
let metas = JSON.parse(localStorage.getItem('meuDinheiroMetas') || '{"meta":0,"supermeta":0}');
let evolChart = null;

function key(y,m){return `${y}-${String(m+1).padStart(2,'0')}`}

function changeMonth(d){
  curMonth += d;
  if(curMonth>11){curMonth=0;curYear++}
  if(curMonth<0){curMonth=11;curYear--}
  render();
}

function render(){
  document.getElementById('monthLabel').textContent = `${MONTHS[curMonth]} ${curYear}`;
  renderAccounts();
  updateBalance();
}

function renderAccounts(){
  const k = key(curYear,curMonth);
  const monthData = data[k] || {};
  const list = document.getElementById('accountsList');
  list.innerHTML = ACCOUNTS.map(a=>`
    <div class="section">
      <div class="account-card">
        <div class="account-header">
          <div class="account-icon" style="background:${a.color}">${a.icon}</div>
          <div><div class="account-name">${a.name}</div><div class="account-type">${a.type}</div></div>
        </div>
        <div class="input-row">
          <label>Saldo (R$)</label>
          <input class="money-input" type="number" id="inp_${a.id}" 
            value="${monthData[a.id]!==undefined?monthData[a.id]:''}" 
            placeholder="0,00" oninput="liveUpdate()">
        </div>
      </div>
    </div>
  `).join('');
}

function getMonthValues(){
  const vals = {};
  ACCOUNTS.forEach(a=>{
    const inp = document.getElementById(`inp_${a.id}`);
    if(inp) vals[a.id] = parseFloat(inp.value)||0;
  });
  return vals;
}

function liveUpdate(){updateBalance()}

function updateBalance(){
  const k = key(curYear,curMonth);
  const vals = getMonthValues();
  const total = Object.values(vals).reduce((s,v)=>s+v,0);
  const prevK = curMonth>0?key(curYear,curMonth-1):key(curYear-1,11);
  const prevData = data[prevK]||{};
  const prevTotal = Object.values(prevData).reduce((s,v)=>s+v,0);
  const diff = total - prevTotal;

  document.getElementById('totalBalance').textContent = fmt(total);
  document.getElementById('totalIn').textContent = diff>0?'+'+fmt(diff):'R$ 0';
  document.getElementById('totalOut').textContent = diff<0?fmt(diff):'R$ 0';
  document.getElementById('totalStable').textContent = fmt(Math.min(prevTotal,total));

  const {emoji,msg} = getFeedback(total,diff);
  document.getElementById('feedbackEmoji').textContent = emoji;
  document.getElementById('feedbackMsg').textContent = msg;

  updateSummary(vals,total,diff);
  updateMeta();
}

function getFeedback(total,diff){
  if(total===0) return {emoji:'👋',msg:'Adicione seus saldos para começar!'};
  if(diff>0) return {emoji:'🥳',msg:`Ótimo! Você cresceu ${fmt(diff)} este mês!`};
  if(diff===0) return {emoji:'😌',msg:'Patrimônio estável este mês.'};
  if(diff<0&&Math.abs(diff)/Math.max(total,1)<0.05) return {emoji:'😐',msg:'Pequena queda, fique de olho!'};
  return {emoji:'😬',msg:`Hmm, queda de ${fmt(Math.abs(diff))}. Vamos recuperar!`};
}

function fmt(v){
  return 'R$ '+Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function saveLancamentos(){
  const k = key(curYear,curMonth);
  const vals = getMonthValues();
  data[k] = vals;
  localStorage.setItem('meuDinheiro',JSON.stringify(data));
  showToast('Salvo com sucesso! ✓');
  updateBalance();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function showTab(tab,btn){
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.style.display='none');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).style.display='block';
  btn.classList.add('active');
  if(tab==='resumo') renderChart();
}

function renderChart(){
  const labels=[];const totals=[];
  for(let m=0;m<12;m++){
    const k=key(curYear,m);
    labels.push(MONTHS[m].slice(0,3));
    const d=data[k]||{};
    totals.push(Object.values(d).reduce((s,v)=>s+v,0));
  }
  const ctx=document.getElementById('chartEvolucao').getContext('2d');
  if(evolChart) evolChart.destroy();
  evolChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      label:'Patrimônio',data:totals,
      borderColor:'#2d6a4f',backgroundColor:'rgba(45,106,79,.1)',
      tension:.4,fill:true,pointRadius:4,pointBackgroundColor:'#2d6a4f'
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        y:{ticks:{callback:v=>'R$'+Math.round(v/1000)+'k',font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}},
        x:{ticks:{font:{size:10}},grid:{display:false}}
      }
    }
  });
}

function updateSummary(vals,total,diff){
  const el = document.getElementById('summaryTable');
  if(!el) return;
  el.innerHTML = ACCOUNTS.map(a=>`
    <div class="summary-row">
      <span>${a.icon} ${a.name}</span>
      <span>${fmt(vals?.[a.id]||0)}</span>
    </div>
  `).join('')+`
    <div class="summary-row">
      <span>Total</span>
      <span style="color:${diff>=0?'#38a169':'#e53e3e'}">${fmt(total)}</span>
    </div>`;
}

function updateMeta(){
  const metaInp = document.getElementById('metaValor');
  const superInp = document.getElementById('superMetaValor');
  if(!metaInp) return;

  if(metaInp.value) metas.meta = parseFloat(metaInp.value)||0;
  if(superInp.value) metas.supermeta = parseFloat(superInp.value)||0;
  localStorage.setItem('meuDinheiroMetas',JSON.stringify(metas));

  const vals = getMonthValues();
  const total = Object.values(vals).reduce((s,v)=>s+v,0);
  const target = metas.meta||metas.supermeta||1;
  const pct = Math.min(100,Math.round((total/target)*100));

  document.getElementById('metaProgress').style.width = pct+'%';
  document.getElementById('metaText').textContent = `${pct}% da meta — você tem ${fmt(total)} de ${fmt(target)}`;

  let emoji='🎯',msg='';
  if(pct===0) {emoji='🎯';msg='Defina seus valores e veja o progresso!'}
  else if(pct<25){emoji='🌱';msg='Cada real conta. Continue!'}
  else if(pct<50){emoji='💪';msg='Bom progresso! Você está no caminho certo.'}
  else if(pct<75){emoji='🔥';msg='Mais da metade! Incrível!'}
  else if(pct<100){emoji='⚡';msg='Quase lá! Você consegue!'}
  else{emoji='🏆';msg='Parabéns! Meta alcançada! Hora de sonhar mais alto!'}

  document.getElementById('metaEmoji').textContent = emoji;
  document.getElementById('metaFeedback').textContent = msg;
}

// Init
if(metas.meta){document.getElementById('metaValor')&&(document.getElementById('metaValor').value=metas.meta)}
if(metas.supermeta){document.getElementById('superMetaValor')&&(document.getElementById('superMetaValor').value=metas.supermeta)}
render();
</script>
</body>
</html>
